<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GREYH4CK | Social Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #0a0c12;
            font-family: 'Share Tech Mono', 'Fira Code', monospace;
            overflow: hidden;
            font-size: clamp(12px, 4vw, 15px);
        }
        /* BACKGROUND TYPING ANIMATION */
        .bg-terminal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #07090e;
            z-index: 0;
            overflow: hidden;
        }
        .bg-line-container {
            position: absolute;
            bottom: 15px;
            left: 20px;
            right: 20px;
            color: #7e8a9e;
            font-size: 12px;
            line-height: 1.7;
            font-family: 'Fira Code', monospace;
        }
        .bg-line { margin-bottom: 5px; opacity: 0.85; white-space: pre-wrap; word-break: break-word; }
        .bg-prompt { color: #aab4c8; display: inline-block; font-weight: bold; }
        .bg-cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background-color: #7e8a9e;
            vertical-align: middle;
            margin-left: 3px;
            animation: bgBlink 1s step-end infinite;
        }
        @keyframes bgBlink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
        
        .grid-overlay, .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .grid-overlay {
            background-image: linear-gradient(rgba(80,90,110,0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(80,90,110,0.04) 1px, transparent 1px);
            background-size: 35px 35px;
        }
        .scanline {
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 8px);
        }
        .app { display: flex; height: 100vh; position: relative; z-index: 10; flex-wrap: wrap; }
        .sidebar {
            width: 280px;
            background: rgba(12, 15, 24, 0.85);
            backdrop-filter: blur(14px);
            border-right: 1px solid rgba(70,76,100,0.3);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        @media (max-width: 768px) {
            .sidebar { width: 100%; max-height: 55px; flex-direction: row; overflow-x: auto; border-bottom: 1px solid rgba(70,76,100,0.3); }
            .profile-card { padding: 0.4rem 0.8rem; }
            .profile-card .avatar { width: 38px; height: 38px; }
            .search-box { display: none; }
            .menu { display: flex; flex-wrap: nowrap; overflow-x: auto; padding: 0.3rem 0; }
            .menu-item { white-space: nowrap; padding: 0.4rem 1rem; }
            .online-users-section { display: none; }
            .file-section { display: none; }
            .main { padding: 0.5rem; }
        }
        .profile-card {
            padding: 1rem;
            border-bottom: 1px solid rgba(70,76,100,0.3);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            position: relative;
            flex-shrink: 0;
        }
        .avatar {
            width: 48px;
            height: 48px;
            background: rgba(30,35,55,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(130,140,170,0.5);
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .avatar i { font-size: 1.6rem; color: #c8d0e5; }
        .username { color: #e5eaf5; font-size: 1rem; font-weight: 600; }
        .god-badge {
            color: #ff7777;
            font-size: 0.75rem;
            background: rgba(255,102,102,0.15);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin { display: inline-block; animation: spin 1.5s linear infinite; }
        .settings-icon { position: absolute; top: 0.8rem; right: 0.8rem; background: rgba(30,35,55,0.8); border: none; border-radius: 8px; padding: 0.3rem 0.6rem; color: #c8d0e5; cursor: pointer; font-size: 0.8rem; }
        .menu { padding: 0.5rem 0; border-bottom: 1px solid rgba(70,76,100,0.3); flex-shrink: 0; }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.7rem 1.2rem;
            color: #c8d0e5;
            cursor: pointer;
            font-size: 0.9rem;
            position: relative;
            transition: 0.2s;
        }
        .menu-item:hover { background: rgba(50,58,85,0.5); }
        .menu-item.active { background: rgba(60,68,100,0.5); color: white; border-left: 3px solid #5de4c7; }
        /* ONLINE USERS SECTION */
        .online-users-section {
            padding: 0.8rem 0.5rem;
            border-bottom: 1px solid rgba(70,76,100,0.3);
        }
        .section-title {
            color: #5de4c7;
            font-size: 0.7rem;
            padding: 0.3rem 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .online-user-list {
            max-height: 180px;
            overflow-y: auto;
        }
        .online-user {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 0.8rem;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.2s;
            color: #c8d0e5;
            font-size: 0.75rem;
        }
        .online-user:hover {
            background: rgba(93,228,199,0.2);
        }
        .online-user.active-chat {
            background: rgba(93,228,199,0.3);
            border-left: 3px solid #5de4c7;
        }
        .online-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #5de4c7;
            box-shadow: 0 0 5px #5de4c7;
        }
        .file-section { flex: 1; padding: 0.5rem 0; overflow-y: auto; flex-shrink: 0; }
        .file-header {
            padding: 0.5rem 1rem;
            color: #aab4c8;
            font-size: 0.7rem;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }
        .file-header button {
            background: rgba(30,35,55,0.8);
            border: none;
            color: #c8d0e5;
            cursor: pointer;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 5px;
        }
        .file-list { max-height: 200px; overflow-y: auto; }
        .file-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.4rem 1rem;
            cursor: pointer;
            font-size: 0.75rem;
            color: #c8d0e5;
        }
        .file-item:hover { background: rgba(50,58,85,0.5); }
        .file-del { opacity: 0; color: #ff8888; cursor: pointer; margin-left: auto; }
        .file-item:hover .file-del { opacity: 1; }
        .main { flex: 1; padding: 0.8rem; overflow-y: auto; background: transparent; }
        .card {
            background: rgba(10, 12, 20, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(70,76,100,0.3);
            overflow: hidden;
            height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
        }
        .card-header {
            background: rgba(18, 22, 35, 0.7);
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid rgba(70,76,100,0.3);
            font-size: 1rem;
            color: #e5eaf5;
        }
        .card-content { flex: 1; padding: 1rem; overflow-y: auto; }
        
        /* CHAT PANEL */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .chat-bubble {
            max-width: 75%;
            padding: 0.6rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            position: relative;
        }
        .chat-mine {
            align-self: flex-end;
            background: #5de4c7;
            color: #0a0c12;
            border-radius: 20px 20px 4px 20px;
        }
        .chat-other {
            align-self: flex-start;
            background: rgba(40,46,80,0.9);
            color: #e5eaf5;
            border-radius: 20px 20px 20px 4px;
        }
        .chat-time {
            font-size: 0.55rem;
            opacity: 0.6;
            margin-top: 5px;
        }
        .chat-input-area {
            display: flex;
            gap: 0.8rem;
            padding: 1rem;
            border-top: 1px solid rgba(70,76,100,0.3);
        }
        .chat-input {
            flex: 1;
            background: rgba(10, 12, 20, 0.8);
            border: 1px solid rgba(70,76,100,0.5);
            border-radius: 25px;
            padding: 0.7rem 1rem;
            color: #c8d0e5;
            outline: none;
            font-size: 0.8rem;
        }
        .btn-send {
            background: #5de4c7;
            border: none;
            border-radius: 25px;
            padding: 0.7rem 1.5rem;
            cursor: pointer;
            font-weight: bold;
            color: #0a0c12;
            transition: 0.2s;
        }
        .btn-send:hover {
            background: #4ac7b0;
            transform: scale(0.98);
        }
        .connection-status {
            padding: 0.5rem;
            text-align: center;
            font-size: 0.65rem;
            background: rgba(18,22,35,0.5);
            border-bottom: 1px solid rgba(70,76,100,0.3);
        }
        .status-connected { color: #5de4c7; }
        .status-disconnected { color: #ff6666; }
        
        /* EDITOR 4 PANEL */
        .editor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 0.8rem;
            height: 100%;
        }
        .editor-panel {
            background: rgba(8, 10, 18, 0.6);
            border: 1px solid rgba(70,76,100,0.3);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
        }
        .editor-header {
            background: rgba(18, 22, 35, 0.7);
            padding: 0.5rem 0.8rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            border-radius: 12px 12px 0 0;
        }
        .editor-header .title { color: #5de4c7; }
        .close-panel {
            background: none;
            border: none;
            color: #ff8888;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .editor-textarea {
            flex: 1;
            background: rgba(5, 7, 12, 0.6);
            border: none;
            color: #d6deeb;
            font-family: monospace;
            font-size: 12px;
            padding: 0.8rem;
            resize: none;
            outline: none;
        }
        .empty-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #aab4c8;
            font-size: 0.8rem;
            cursor: pointer;
        }
        
        /* POSTS */
        .post {
            background: rgba(18, 22, 35, 0.7);
            border: 1px solid rgba(70,76,100,0.3);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.8rem;
            cursor: pointer;
        }
        .post-avatar {
            width: 42px;
            height: 42px;
            background: rgba(30,35,55,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .post-username { color: #e5eaf5; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .post-time { font-size: 0.65rem; color: #8a95aa; }
        .post-content { color: #c8d0e5; font-size: 0.85rem; margin: 0.5rem 0; line-height: 1.4; }
        .post-media { margin: 0.5rem 0; text-align: center; }
        .post-media img { max-width: 100%; max-height: 200px; border-radius: 12px; }
        .post-actions { display: flex; gap: 1.5rem; padding-top: 0.5rem; border-top: 1px solid rgba(70,76,100,0.3); }
        .post-like, .post-comment { color: #aab4c8; font-size: 0.8rem; cursor: pointer; }
        .post-like.liked { color: #ff7777; }
        
        /* NEW POST */
        .new-post {
            background: rgba(18, 22, 35, 0.7);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .post-type {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }
        .type-btn {
            background: rgba(30,35,55,0.8);
            border: 1px solid rgba(70,76,100,0.5);
            border-radius: 25px;
            padding: 0.4rem 1rem;
            color: #c8d0e5;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        .type-btn.active { background: #5de4c7; color: #0a0c12; }
        .post-input {
            width: 100%;
            background: rgba(10, 12, 20, 0.8);
            border: 1px solid rgba(70,76,100,0.5);
            border-radius: 12px;
            padding: 0.8rem;
            color: #c8d0e5;
            font-size: 0.8rem;
            resize: vertical;
            outline: none;
        }
        .media-input {
            width: 100%;
            background: rgba(10, 12, 20, 0.8);
            border: 1px solid rgba(70,76,100,0.5);
            border-radius: 12px;
            padding: 0.6rem;
            margin-top: 0.5rem;
            color: #c8d0e5;
            font-size: 0.75rem;
            outline: none;
        }
        .btn-post {
            margin-top: 0.8rem;
            background: #5de4c7;
            color: #0a0c12;
            border: none;
            border-radius: 25px;
            padding: 0.5rem 1.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .btn-post:hover {
            background: #4ac7b0;
        }
        
        /* RANKING */
        .rank-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem;
            background: rgba(18, 22, 35, 0.7);
            border-radius: 14px;
            margin-bottom: 0.8rem;
        }
        .rank-num { font-size: 1.4rem; width: 60px; }
        .rank-name { color: #e5eaf5; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .rank-stats { font-size: 0.65rem; color: #8a95aa; }
        .rank-score { color: #5de4c7; font-weight: bold; margin-left: auto; font-size: 0.9rem; }
        
        /* DRAWER */
        .drawer {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100%;
            background: rgba(8, 10, 18, 0.97);
            backdrop-filter: blur(20px);
            z-index: 200;
            transition: 0.3s;
            border-left: 1px solid rgba(70,76,100,0.6);
            padding: 2rem;
        }
        .drawer.open { right: 0; }
        .drawer-header { display: flex; justify-content: space-between; color: #e5eaf5; margin-bottom: 1rem; font-size: 1rem; }
        .drawer-close { background: none; border: none; color: #aab4c8; font-size: 1.8rem; cursor: pointer; }
        .avatar-large {
            width: 90px;
            height: 90px;
            background: rgba(30,35,55,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            border: 2px solid #8a95aa;
            overflow: hidden;
        }
        .drawer-input {
            width: 100%;
            background: rgba(5, 7, 12, 0.9);
            border: 1px solid #2a2e45;
            border-radius: 10px;
            padding: 0.7rem;
            color: #c8d0e5;
            outline: none;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }
        .drawer-btn {
            background: rgba(30,35,55,0.9);
            border: 1px solid #4a5068;
            border-radius: 10px;
            padding: 0.7rem;
            color: #c8d0e5;
            cursor: pointer;
            width: 100%;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .drawer-btn:hover {
            background: rgba(50,58,85,0.9);
        }
        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(8, 10, 18, 0.95);
            border: 1px solid #5a6378;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            color: #c8d0e5;
            font-size: 0.8rem;
            z-index: 100;
            opacity: 0;
            transition: 0.3s;
        }
        .toast.show { opacity: 1; }
        .status-bar {
            padding: 0.4rem 1rem;
            background: rgba(8, 10, 18, 0.6);
            border-top: 1px solid rgba(70,76,100,0.3);
            font-size: 0.65rem;
            color: #aab4c8;
        }
        
        /* BUTTON STYLES (rounded) */
        button, .btn, .drawer-btn, .btn-post, .btn-send, .type-btn, .settings-icon {
            border-radius: 25px !important;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover, .btn:hover, .drawer-btn:hover, .btn-post:hover, .btn-send:hover, .type-btn:hover {
            transform: translateY(-2px);
        }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(8, 10, 18, 0.5); }
        ::-webkit-scrollbar-thumb { background: #5de4c7; border-radius: 5px; }
    </style>
</head>
<body>

<div class="bg-terminal">
    <div class="bg-line-container" id="bgContainer"></div>
</div>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<div class="app">
    <div class="sidebar">
        <div class="profile-card">
            <div class="avatar" id="sideAvatar"><i class="fas fa-user-secret"></i></div>
            <div><div class="username" id="sideUsername">Loading...</div><div class="profile-edit-icon" id="editIcon" style="font-size:0.7rem; cursor:pointer;">✎ edit</div></div>
            <button class="settings-icon" id="settingsBtn"><i class="fas fa-cog"></i></button>
        </div>
        
        <!-- ONLINE USERS SECTION -->
        <div class="online-users-section">
            <div class="section-title">
                <i class="fas fa-users"></i> ONLINE USERS
                <span style="font-size:0.6rem;" id="onlineCount">(0)</span>
            </div>
            <div class="online-user-list" id="onlineUsersList">
                <div style="padding:0.5rem;color:#8a95aa;text-align:center;">Loading...</div>
            </div>
        </div>
        
        <div class="menu">
            <div class="menu-item" data-page="dashboard"><i class="fas fa-tachometer-alt"></i><span>DASHBOARD</span></div>
            <div class="menu-item" data-page="threads"><i class="fas fa-feather-alt"></i><span>THREADS</span><span id="notifBadge" class="notif-badge" style="display:none;">0</span></div>
            <div class="menu-item" data-page="ranking"><i class="fas fa-trophy"></i><span>RANKING</span></div>
            <div class="menu-item" data-page="editor"><i class="fas fa-code"></i><span>TERMUX EDITOR</span></div>
            <div class="menu-item" data-page="liveview"><i class="fas fa-eye"></i><span>LIVE VIEW</span></div>
            <div class="menu-item" data-page="admin" id="adminMenu" style="display:none;"><i class="fas fa-crown"></i><span>ADMIN</span></div>
        </div>
        <div class="file-section">
            <div class="file-header"><span><i class="fas fa-folder"></i> FILES</span><button id="newFileBtn"><i class="fas fa-plus"></i></button></div>
            <div id="fileList" class="file-list"></div>
        </div>
    </div>
    <div class="main" id="mainContent"></div>
</div>

<div id="drawer" class="drawer">
    <div class="drawer-header"><span>EDIT PROFILE</span><button class="drawer-close" id="closeDrawer">&times;</button></div>
    <div class="avatar-large" id="drawerAvatar"><i class="fas fa-user-secret"></i></div>
    <button id="uploadAvatarBtn" class="drawer-btn" style="margin-bottom:0.5rem;">Ganti Foto</button>
    <input type="file" id="avatarInput" accept="image/*" style="display:none;">
    <input type="text" id="drawerUsername" class="drawer-input" placeholder="Username">
    <input type="email" id="drawerEmail" class="drawer-input" placeholder="Email">
    <textarea id="drawerBio" class="drawer-input" rows="2" placeholder="Bio"></textarea>
    <button id="saveProfileBtn" class="drawer-btn">SIMPAN</button>
    <button id="logoutBtn" class="drawer-btn" style="background:#2a1a1a; margin-top:0.5rem;">LOGOUT</button>
</div>

<div id="toast" class="toast"></div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

<script>
    // ========== INIT ==========
    if (!sessionStorage.getItem('greySession')) window.location.href = 'login.html';
    
    const ADMIN = "grey";
    let blockedUsers = JSON.parse(localStorage.getItem('grey_blocked') || '[]');
    let globalPosts = JSON.parse(localStorage.getItem('grey_posts') || '[]');
    let users = [];
    let currentUser = null;
    let panelFiles = [null, null, null, null];
    let currentPage = 'dashboard';
    let postType = 'text';
    let liveFormat = 'html';
    let notifications = [];
    
    // P2P Chat variables
    let peer = null;
    let activeConnections = {};
    let currentChatUser = null;
    let heartbeatInterval = null;
    
    function saveUsers() { localStorage.setItem('greyhack_users', JSON.stringify(users)); }
    function saveBlocked() { localStorage.setItem('grey_blocked', JSON.stringify(blockedUsers)); }
    function savePosts() { localStorage.setItem('grey_posts', JSON.stringify(globalPosts)); }
    function saveNotif() { localStorage.setItem('notifications', JSON.stringify(notifications)); }
    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])) || ''; }
    
    // Background typing animation
    const bgContainer = document.getElementById('bgContainer');
    const bgCmds = [
        "> connecting to secure server...",
        "> peer-to-peer chat active",
        "$ online users: click to chat",
        "> end-to-end encrypted",
        "$ no server, direct connection",
        "> type /help for commands"
    ];
    let bgIdx = 0, bgCharIdx = 0, bgIsTyping = true;
    function typeBackground() {
        if (bgIsTyping) {
            if (bgCharIdx < bgCmds[bgIdx % bgCmds.length].length) {
                const currentLine = bgCmds[bgIdx % bgCmds.length].substring(0, bgCharIdx + 1);
                bgContainer.innerHTML = `<div class="bg-line"><span class="bg-prompt">grey@hack:~$ </span>${currentLine}<span class="bg-cursor"></span></div>`;
                bgCharIdx++;
                setTimeout(typeBackground, 40 + Math.random() * 30);
            } else {
                bgContainer.innerHTML = `<div class="bg-line"><span class="bg-prompt">grey@hack:~$ </span>${bgCmds[bgIdx % bgCmds.length]}</div>`;
                bgIsTyping = false;
                setTimeout(() => {
                    bgIdx++;
                    bgCharIdx = 0;
                    bgIsTyping = true;
                    typeBackground();
                }, 2000);
            }
        }
    }
    setTimeout(typeBackground, 500);
    
    // Update online status
    function updateOnlineStatus() {
        if (!currentUser) return;
        const status = {
            username: currentUser.username,
            peerId: getPeerIdForUser(currentUser.username),
            timestamp: Date.now(),
            avatar: currentUser.workspace?.avatar || null
        };
        localStorage.setItem(`p2p_online_${currentUser.username}`, JSON.stringify(status));
        
        const now = Date.now();
        Object.keys(localStorage).forEach(key => {
            if (key.startsWith('p2p_online_')) {
                try {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (now - data.timestamp > 10000) localStorage.removeItem(key);
                } catch(e) {}
            }
        });
    }
    
    function getOnlineUsers() {
        const online = [];
        const now = Date.now();
        Object.keys(localStorage).forEach(key => {
            if (key.startsWith('p2p_online_') && !key.includes(currentUser?.username)) {
                try {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (now - data.timestamp < 10000) {
                        online.push({ username: key.replace('p2p_online_', ''), peerId: data.peerId, avatar: data.avatar });
                    } else {
                        localStorage.removeItem(key);
                    }
                } catch(e) {}
            }
        });
        return online;
    }
    
    function getPeerIdForUser(username) {
        let peerId = localStorage.getItem(`p2p_id_${username}`);
        if (!peerId) {
            peerId = `${username}_${Math.random().toString(36).substring(2, 8)}${Date.now()}`;
            localStorage.setItem(`p2p_id_${username}`, peerId);
        }
        return peerId;
    }
    
    function connectToUser(username, peerId) {
        if (activeConnections[username]) {
            showToast(`Already connected to ${username}`);
            openChatPanel(username);
            return;
        }
        
        if (!peer) { showToast("Please wait, connecting..."); return; }
        
        const conn = peer.connect(peerId);
        
        conn.on('open', () => {
            activeConnections[username] = conn;
            showToast(`Connected to ${username}!`);
            openChatPanel(username);
            conn.send({ type: 'status', status: 'online' });
        });
        
        conn.on('data', (data) => {
            if (data.type === 'chat') {
                receiveChatMessage(username, data.message, data.time);
            }
        });
        
        conn.on('close', () => {
            delete activeConnections[username];
            if (currentChatUser === username) closeChatPanel();
            showToast(`${username} disconnected`);
        });
        
        conn.on('error', (err) => { console.error(err); delete activeConnections[username]; });
    }
    
    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const msg = input?.value.trim();
        if (!msg || !currentChatUser) return;
        
        const conn = activeConnections[currentChatUser];
        if (!conn) { showToast(`Not connected to ${currentChatUser}`); return; }
        
        conn.send({ type: 'chat', message: msg, time: new Date().toLocaleTimeString() });
        addChatMessageToUI(msg, true);
        input.value = '';
    }
    
    function receiveChatMessage(username, message, time) {
        if (currentChatUser === username) {
            addChatMessageToUI(message, false, time);
        } else {
            showToast(`New message from ${username}`);
        }
    }
    
    function addChatMessageToUI(message, isMine, time = null) {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        const div = document.createElement('div');
        div.className = `chat-bubble ${isMine ? 'chat-mine' : 'chat-other'}`;
        div.innerHTML = `<div>${escapeHtml(message)}</div><div class="chat-time">${time || new Date().toLocaleTimeString()}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    
    function openChatPanel(username) {
        currentChatUser = username;
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-comments"></i> Chat with ${username}

                </div>
                <div class="connection-status">
                    <span class="status-connected">✅ Connected to ${username}</span>

                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendChatMessage()">
                    <button class="btn-send" onclick="sendChatMessage()">Send</button>
                </div>
            </div>
        `;
    }
    
    function closeChatPanel() { currentChatUser = null; setPage(currentPage); }
    
    function renderOnlineUsers() {
        const online = getOnlineUsers();
        const container = document.getElementById('onlineUsersList');
        if (!container) return;
        document.getElementById('onlineCount').innerText = `(${online.length})`;
        if (online.length === 0) {
            container.innerHTML = '<div style="padding:0.5rem;color:#8a95aa;text-align:center;">No users online</div>';
            return;
        }
        container.innerHTML = online.map(user => `
            <div class="online-user ${currentChatUser === user.username ? 'active-chat' : ''}" onclick="connectToUser('${user.username}', '${user.peerId}')">
                <span class="online-status"></span>
                <span style="flex:1;">${user.username} ${user.username === ADMIN ? '👑' : ''}</span>
                <i class="fas fa-comment" style="font-size:0.6rem;opacity:0.6;"></i>
            </div>
        `).join('');
    }
    
    function initP2P() {
        if (!currentUser) return;
        const myPeerId = getPeerIdForUser(currentUser.username);
        peer = new Peer(myPeerId, {
            host: '0.peerjs.com',
            port: 443,
            path: '/',
            secure: true,
            debug: 0
        });
        peer.on('open', () => { updateOnlineStatus(); heartbeatInterval = setInterval(updateOnlineStatus, 3000); });
        peer.on('connection', (conn) => {
            const username = conn.peer.split('_')[0];
            activeConnections[username] = conn;
            conn.on('data', (data) => { if (data.type === 'chat') receiveChatMessage(username, data.message, data.time); });
            conn.on('close', () => { delete activeConnections[username]; });
        });
        peer.on('error', (err) => { console.warn(err); });
    }
    
    setInterval(renderOnlineUsers, 2000);

        const stored = localStorage.getItem('greyhack_users');

                { username: "nexus", password: "nexus99", email: "nexus@test.com", bio: "Security Expert 🔒", followers: 1234, following: [], workspace: { files: {}, panelFiles: [null, null, null, null], avatar: null } }
            ];
            saveUsers();
        }
        const session = sessionStorage.getItem('greySession');
        if (session) {
            const { username } = JSON.parse(session);
            if (blockedUsers.includes(username)) { sessionStorage.removeItem('greySession'); window.location.href = 'login.html'; return; }
            currentUser = users.find(u => u.username === username);

        }
    }

        const idx = users.findIndex(u => u.username === updated.username);
