<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GREYH4CK | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #1a1d2e;
            font-family: 'Share Tech Mono', 'Fira Code', monospace;
            overflow: hidden;
            font-size: clamp(12px, 4vw, 16px);
        }
        /* BACKGROUND TYPING ANIMATION */
        .bg-terminal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121520;
            z-index: 0;
            overflow: hidden;
        }
        .bg-line-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            color: #8a95aa;
            font-size: 11px;
            line-height: 1.6;
            font-family: monospace;
        }
        .bg-line {
            margin-bottom: 4px;
            opacity: 0.7;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .bg-prompt { color: #a0a8bc; display: inline-block; }
        .grid-overlay, .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .grid-overlay {
            background-image: linear-gradient(rgba(80,90,100,0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(80,90,100,0.05) 1px, transparent 1px);
            background-size: 35px 35px;
        }
        .scanline {
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 2px, transparent 2px, transparent 8px);
        }
        /* Main Layout - Responsive */
        .app { display: flex; height: 100vh; position: relative; z-index: 10; flex-wrap: wrap; }
        .sidebar {
            width: 280px;
            background: rgba(20,24,40,0.85);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(60,66,90,0.3);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        /* Responsive - Mobile */
        @media (max-width: 768px) {
            .sidebar { width: 100%; max-height: 60px; flex-direction: row; overflow-x: auto; overflow-y: hidden; border-right: none; border-bottom: 1px solid rgba(60,66,90,0.3); }
            .profile-card { padding: 0.5rem; border-bottom: none; }
            .search-box { display: none; }
            .menu { display: flex; flex-wrap: nowrap; overflow-x: auto; padding: 0.3rem 0; border-bottom: none; }
            .menu-item { white-space: nowrap; }
            .file-section { display: none; }
            .main { padding: 0.5rem; }
        }
        .profile-card {
            padding: 1rem;
            border-bottom: 1px solid rgba(60,66,90,0.3);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            position: relative;
            flex-shrink: 0;
        }
        .avatar {
            width: 48px;
            height: 48px;
            background: rgba(30,35,55,0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(110,120,150,0.5);
        }
        .avatar i { font-size: 1.6rem; color: #c0c8dc; }
        .username { color: #e0e6f5; font-size: 1rem; font-weight: 600; }
        .god-badge {
            color: #ff6666;
            font-size: 0.75rem;
            background: rgba(255,102,102,0.15);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin { display: inline-block; animation: spin 1.5s linear infinite; }
        .settings-icon { position: absolute; top: 0.8rem; right: 0.8rem; background: rgba(30,35,55,0.8); border: none; border-radius: 8px; padding: 0.3rem 0.6rem; color: #c0c8dc; cursor: pointer; font-size: 0.8rem; }
        .menu { padding: 0.5rem 0; border-bottom: 1px solid rgba(60,66,90,0.3); flex-shrink: 0; }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.7rem 1.2rem;
            color: #c0c8dc;
            cursor: pointer;
            font-size: 0.9rem;
            position: relative;
        }
        .menu-item:hover { background: rgba(40,46,70,0.5); }
        .menu-item.active { background: rgba(50,58,85,0.5); color: white; border-left: 3px solid #5de4c7; }
        .notif-badge {
            position: absolute;
            right: 1rem;
            background: #ff6666;
            color: white;
            border-radius: 50%;
            padding: 0.15rem 0.5rem;
            font-size: 0.7rem;
        }
        .search-box { padding: 0.5rem 1rem; border-bottom: 1px solid rgba(60,66,90,0.3); flex-shrink: 0; }
        .search-input {
            width: 100%;
            background: rgba(18,21,32,0.8);
            border: 1px solid rgba(60,66,90,0.5);
            border-radius: 25px;
            padding: 0.6rem 1rem;
            color: #c0c8dc;
            font-size: 0.8rem;
            outline: none;
        }
        .search-results {
            margin-top: 0.3rem;
            background: rgba(18,21,32,0.95);
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        .search-result {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            color: #c0c8dc;
            cursor: pointer;
        }
        .search-result:hover { background: rgba(40,46,70,0.6); }
        .file-section { flex: 1; padding: 0.5rem 0; overflow-y: auto; flex-shrink: 0; }
        .file-header {
            padding: 0.5rem 1rem;
            color: #a0a8bc;
            font-size: 0.7rem;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }
        .file-header button {
            background: rgba(30,35,55,0.8);
            border: none;
            color: #c0c8dc;
            cursor: pointer;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 5px;
        }
        .file-list { max-height: 200px; overflow-y: auto; }
        .file-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.4rem 1rem;
            cursor: pointer;
            font-size: 0.75rem;
            color: #c0c8dc;
        }
        .file-item:hover { background: rgba(40,46,70,0.5); }
        .file-del { opacity: 0; color: #ff8888; cursor: pointer; margin-left: auto; }
        .file-item:hover .file-del { opacity: 1; }
        .main { flex: 1; padding: 0.8rem; overflow-y: auto; background: transparent; }
        
        /* Cards - Transparent */
        .card {
            background: rgba(18,21,32,0.65);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(60,66,90,0.3);
            overflow: hidden;
            height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
        }
        .card-header {
            background: rgba(25,29,45,0.7);
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid rgba(60,66,90,0.3);
            font-size: 1rem;
            color: #e0e6f5;
        }
        .card-content { flex: 1; padding: 1rem; overflow-y: auto; }
        
        /* Editor 4 Panel */
        .editor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 0.8rem;
            height: 100%;
        }
        .editor-panel {
            background: rgba(18,21,32,0.5);
            border: 1px solid rgba(60,66,90,0.3);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
        }
        .editor-header {
            background: rgba(25,29,45,0.7);
            padding: 0.5rem 0.8rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
        }
        .editor-header .title { color: #5de4c7; }
        .editor-textarea {
            flex: 1;
            background: rgba(12,15,25,0.5);
            border: none;
            color: #d6deeb;
            font-family: monospace;
            font-size: 12px;
            padding: 0.8rem;
            resize: none;
            outline: none;
        }
        .empty-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #a0a8bc;
            font-size: 0.8rem;
            cursor: pointer;
        }
        
        /* Posts/Threads */
        .post {
            background: rgba(25,29,45,0.7);
            border: 1px solid rgba(60,66,90,0.3);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.8rem;
            cursor: pointer;
        }
        .post-avatar {
            width: 42px;
            height: 42px;
            background: rgba(30,35,55,0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .post-username { color: #e0e6f5; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .post-time { font-size: 0.65rem; color: #8a95aa; }
        .post-content { color: #c0c8dc; font-size: 0.85rem; margin: 0.5rem 0; line-height: 1.4; }
        .post-media { margin: 0.5rem 0; text-align: center; }
        .post-media img { max-width: 100%; max-height: 250px; border-radius: 12px; }
        .post-actions { display: flex; gap: 1.5rem; padding-top: 0.5rem; border-top: 1px solid rgba(60,66,90,0.3); }
        .post-like, .post-comment { color: #a0a8bc; font-size: 0.8rem; cursor: pointer; }
        .post-like.liked { color: #ff6666; }
        .new-post {
            background: rgba(25,29,45,0.7);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .post-type { display: flex; gap: 0.8rem; margin-bottom: 0.8rem; }
        .type-btn {
            background: rgba(30,35,55,0.8);
            border: 1px solid rgba(60,66,90,0.5);
            border-radius: 25px;
            padding: 0.3rem 1rem;
            color: #c0c8dc;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .type-btn.active { background: #5de4c7; color: #0a0c0f; }
        .post-input {
            width: 100%;
            background: rgba(18,21,32,0.8);
            border: 1px solid rgba(60,66,90,0.5);
            border-radius: 12px;
            padding: 0.8rem;
            color: #c0c8dc;
            font-size: 0.8rem;
            resize: vertical;
            outline: none;
        }
        .media-input {
            width: 100%;
            background: rgba(18,21,32,0.8);
            border: 1px solid rgba(60,66,90,0.5);
            border-radius: 12px;
            padding: 0.6rem;
            margin-top: 0.5rem;
            color: #c0c8dc;
            font-size: 0.75rem;
            outline: none;
        }
        .btn-post {
            margin-top: 0.8rem;
            background: #5de4c7;
            color: #0a0c0f;
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        /* Chat */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
        }
        .chat-bubble {
            max-width: 75%;
            padding: 0.6rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 0.8rem;
            position: relative;
        }
        .chat-mine {
            align-self: flex-end;
            background: #5de4c7;
            color: #0a0c0f;
        }
        .chat-other {
            align-self: flex-start;
            background: rgba(40,46,70,0.9);
            color: #e0e6f5;
        }
        .chat-delete {
            position: absolute;
            bottom: -18px;
            right: 8px;
            background: none;
            border: none;
            color: #ff8888;
            cursor: pointer;
            font-size: 0.6rem;
            opacity: 0;
        }
        .chat-bubble:hover .chat-delete { opacity: 1; }
        .chat-input-area {
            display: flex;
            gap: 0.8rem;
            padding: 0.8rem;
            border-top: 1px solid rgba(60,66,90,0.3);
        }
        .chat-input {
            flex: 1;
            background: rgba(18,21,32,0.8);
            border: 1px solid rgba(60,66,90,0.5);
            border-radius: 25px;
            padding: 0.6rem 1rem;
            color: #c0c8dc;
            outline: none;
            font-size: 0.8rem;
        }
        
        /* Community */
        .community-layout { display: flex; flex: 1; flex-wrap: wrap; }
        @media (max-width: 768px) { .community-layout { flex-direction: column; } .group-list { width: 100%; max-height: 120px; flex-direction: row; overflow-x: auto; } .member-list { width: 100%; max-height: 100px; } }
        .group-list {
            width: 240px;
            background: rgba(18,21,32,0.5);
            border-right: 1px solid rgba(60,66,90,0.3);
            padding: 0.8rem;
            overflow-y: auto;
        }
        .group-item {
            padding: 0.6rem;
            margin: 0.3rem 0;
            border-radius: 10px;
            cursor: pointer;
            color: #c0c8dc;
            font-size: 0.8rem;
        }
        .group-item.active { background: rgba(93,228,199,0.15); border-left: 3px solid #5de4c7; }
        .group-create {
            margin-top: 0.8rem;
            background: rgba(30,35,55,0.8);
            border-radius: 10px;
            padding: 0.5rem;
            text-align: center;
            cursor: pointer;
            font-size: 0.75rem;
            color: #c0c8dc;
        }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .member-list {
            width: 200px;
            background: rgba(18,21,32,0.5);
            border-left: 1px solid rgba(60,66,90,0.3);
            padding: 0.8rem;
            overflow-y: auto;
        }
        .member-item {
            padding: 0.4rem;
            font-size: 0.75rem;
            color: #c0c8dc;
            cursor: pointer;
        }
        .delete-msg {
            background: none;
            border: none;
            color: #ff8888;
            cursor: pointer;
            font-size: 0.65rem;
            margin-left: 0.6rem;
            opacity: 0;
        }
        .chat-msg:hover .delete-msg { opacity: 1; }
        
        /* Profile */
        .profile-cover { height: 130px; background: linear-gradient(135deg, #2a2e48, #1a1d30); border-radius: 20px 20px 0 0; }
        .profile-info {
            text-align: center;
            margin-top: -45px;
            padding: 0 1.5rem 1.2rem;
        }
        .profile-avatar-large {
            width: 90px;
            height: 90px;
            background: #2a2e48;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            border: 3px solid #5de4c7;
            font-size: 2.2rem;
        }
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin: 1rem 0;
        }
        .profile-stat { text-align: center; cursor: pointer; }
        .profile-stat-num { font-size: 1.2rem; font-weight: bold; color: #5de4c7; }
        .profile-stat-label { font-size: 0.7rem; color: #a0a8bc; }
        .profile-bio { color: #c0c8dc; font-size: 0.8rem; margin: 0.5rem 0; }
        .profile-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        .btn-follow, .btn-chat, .btn-back {
            background: #5de4c7;
            color: #0a0c0f;
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .btn-unfollow { background: #ff6666; color: white; }
        .profile-tabs {
            display: flex;
            border-top: 1px solid rgba(60,66,90,0.3);
            border-bottom: 1px solid rgba(60,66,90,0.3);
        }
        .profile-tab {
            flex: 1;
            text-align: center;
            padding: 0.8rem;
            color: #a0a8bc;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .profile-tab.active { color: #5de4c7; border-bottom: 2px solid #5de4c7; }
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            padding: 1rem;
        }
        .profile-grid-item {
            background: rgba(30,35,55,0.7);
            border-radius: 12px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        /* Ranking */
        .rank-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem;
            background: rgba(25,29,45,0.7);
            border-radius: 14px;
            margin-bottom: 0.8rem;
        }
        .rank-num { font-size: 1.4rem; width: 60px; }
        .rank-name { color: #e0e6f5; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .rank-stats { font-size: 0.65rem; color: #8a95aa; }
        .rank-score { color: #5de4c7; font-weight: bold; margin-left: auto; font-size: 0.9rem; }
        
        /* Drawer */
        .drawer {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100%;
            background: rgba(18,21,32,0.97);
            backdrop-filter: blur(20px);
            z-index: 200;
            transition: 0.3s;
            border-left: 1px solid rgba(60,66,90,0.6);
            padding: 2rem;
        }
        .drawer.open { right: 0; }
        .drawer-header { display: flex; justify-content: space-between; color: #e0e6f5; margin-bottom: 1rem; font-size: 1rem; }
        .drawer-close { background: none; border: none; color: #a0a8bc; font-size: 1.8rem; cursor: pointer; }
        .avatar-large {
            width: 90px;
            height: 90px;
            background: rgba(30,35,55,0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            border: 2px solid #6e7b8c;
            cursor: pointer;
        }
        .drawer-input {
            width: 100%;
            background: rgba(12,15,25,0.9);
            border: 1px solid #2a2e42;
            border-radius: 10px;
            padding: 0.7rem;
            color: #c0c8dc;
            outline: none;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }
        .drawer-btn {
            background: rgba(30,35,55,0.9);
            border: 1px solid #4a5068;
            border-radius: 10px;
            padding: 0.7rem;
            color: #c0c8dc;
            cursor: pointer;
            width: 100%;
            font-size: 0.85rem;
        }
        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(18,21,32,0.95);
            border: 1px solid #5a6378;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            color: #c0c8dc;
            font-size: 0.8rem;
            z-index: 100;
            opacity: 0;
            transition: 0.3s;
        }
        .toast.show { opacity: 1; }
        .status-bar {
            padding: 0.4rem 1rem;
            background: rgba(18,21,32,0.6);
            border-top: 1px solid rgba(60,66,90,0.3);
            font-size: 0.65rem;
            color: #a0a8bc;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(18,21,32,0.5); }
        ::-webkit-scrollbar-thumb { background: #5de4c7; border-radius: 5px; }
        
        /* Blink animation for cursor */
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="bg-terminal">
    <div class="bg-line-container" id="bgContainer"></div>
</div>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<div class="app">
    <div class="sidebar">
        <div class="profile-card">
            <div class="avatar" id="sideAvatar"><i class="fas fa-user-secret"></i></div>
            <div><div class="username" id="sideUsername">Loading...</div><div class="profile-edit-icon" id="editIcon" style="font-size:0.7rem; cursor:pointer;">✎ edit</div></div>
            <button class="settings-icon" id="settingsBtn"><i class="fas fa-cog"></i></button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search user...">
            <div id="searchResults" class="search-results"></div>
        </div>
        <div class="menu">
            <div class="menu-item" data-page="dashboard"><i class="fas fa-tachometer-alt"></i><span>DASHBOARD</span></div>
            <div class="menu-item" data-page="threads"><i class="fas fa-feather-alt"></i><span>THREADS</span><span id="notifBadge" class="notif-badge" style="display:none;">0</span></div>
            <div class="menu-item" data-page="ranking"><i class="fas fa-trophy"></i><span>RANKING</span></div>
            <div class="menu-item" data-page="editor"><i class="fas fa-code"></i><span>TERMUX EDITOR</span></div>
            <div class="menu-item" data-page="liveview"><i class="fas fa-eye"></i><span>LIVE VIEW</span></div>
            <div class="menu-item" data-page="community"><i class="fas fa-users"></i><span>COMMUNITY</span></div>
            <div class="menu-item" data-page="admin" id="adminMenu" style="display:none;"><i class="fas fa-crown"></i><span>ADMIN</span></div>
        </div>
        <div class="file-section">
            <div class="file-header"><span><i class="fas fa-folder"></i> FILES</span><button id="newFileBtn"><i class="fas fa-plus"></i></button></div>
            <div id="fileList" class="file-list"></div>
        </div>
    </div>
    <div class="main" id="mainContent"></div>
</div>

<div id="drawer" class="drawer">
    <div class="drawer-header"><span>EDIT PROFILE</span><button class="drawer-close" id="closeDrawer">&times;</button></div>
    <div class="avatar-large" id="drawerAvatar"><i class="fas fa-user-secret"></i></div>
    <button id="uploadAvatarBtn" class="drawer-btn" style="margin-bottom:0.5rem;">Ganti Foto</button>
    <input type="file" id="avatarInput" accept="image/*" style="display:none;">
    <input type="text" id="drawerUsername" class="drawer-input" placeholder="Username">
    <input type="email" id="drawerEmail" class="drawer-input" placeholder="Email">
    <textarea id="drawerBio" class="drawer-input" rows="2" placeholder="Bio"></textarea>
    <button id="saveProfileBtn" class="drawer-btn">SIMPAN</button>
    <button id="logoutBtn" class="drawer-btn" style="background:#2a1a1a; margin-top:0.5rem;">LOGOUT</button>
</div>

<div id="toast" class="toast"></div>

<script>
    // ========== INIT ==========
    if (!sessionStorage.getItem('greySession')) window.location.href = 'login.html';
    
    const ADMIN = "grey";
    let blockedUsers = JSON.parse(localStorage.getItem('grey_blocked') || '[]');
    let globalPosts = JSON.parse(localStorage.getItem('grey_posts') || '[]');
    let privateChats = JSON.parse(localStorage.getItem('private_chats') || '{}');
    let communityGroups = JSON.parse(localStorage.getItem('grey_community') || JSON.stringify({
        hackers: { name: "💀 H4CKERS_CORE", members: ["grey", "nexus"], chats: [] },
        devs: { name: "⚡ DEV_TERMINAL", members: ["grey", "nexus"], chats: [] }
    }));
    let notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
    let users = [];
    let currentUser = null;
    let panelFiles = [null, null, null, null];
    let currentGroup = 'hackers';
    let currentChatUser = null, currentChatId = null, chatInterval = null, communityInterval = null;
    let viewingProfile = null, profileTab = 'posts';
    let currentPage = 'dashboard';
    let postType = 'text', mediaUrl = '';
    let liveFormat = 'html';

    function saveUsers() { localStorage.setItem('greyhack_users', JSON.stringify(users)); }
    function saveBlocked() { localStorage.setItem('grey_blocked', JSON.stringify(blockedUsers)); }
    function savePosts() { localStorage.setItem('grey_posts', JSON.stringify(globalPosts)); }
    function savePrivate() { localStorage.setItem('private_chats', JSON.stringify(privateChats)); }
    function saveCommunity() { localStorage.setItem('grey_community', JSON.stringify(communityGroups)); }
    function saveNotif() { localStorage.setItem('notifications', JSON.stringify(notifications)); }
    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])) || ''; }
    function updateNotifBadge() {
        const unread = notifications.filter(n => !n.read).length;
        const badge = document.getElementById('notifBadge');
        if (badge) { if (unread > 0) { badge.style.display = 'inline-block'; badge.innerText = unread > 9 ? '9+' : unread; } else badge.style.display = 'none'; }
    }
    function addNotif(msg, type) { notifications.unshift({ id: Date.now(), message: msg, type, time: new Date().toLocaleTimeString(), read: false }); if (notifications.length > 30) notifications.pop(); saveNotif(); updateNotifBadge(); }

    // ========== BACKGROUND TYPING ANIMATION ==========
    const bgContainer = document.getElementById('bgContainer');
    const bgCmds = [
        "> connecting to server...",
        "> ssh grey@10.0.0.45",
        "> decrypting payload.....",
        "$ sudo systemctl start firewall",
        "> scanning open ports: 22, 443, 8080",
        "$ grep -r 'flag' /var/log",
        "> establishing secure channel",
        "$ chmod 755 ./exploit",
        "> injecting bypass payload",
        "$ curl -X POST https://api.grey/sec",
        "> authentication token: ********",
        "$ python3 scanner.py --target 10.0.0.1",
        "> encrypted tunnel established",
        "$ ./run --silent --force"
    ];
    let bgIdx = 0, bgCharIdx = 0, bgIsTyping = true, bgCurrentLine = "";
    function typeBackground() {
        if (bgIsTyping) {
            if (bgCharIdx < bgCmds[bgIdx % bgCmds.length].length) {
                bgCurrentLine = bgCmds[bgIdx % bgCmds.length].substring(0, bgCharIdx + 1);
                bgContainer.innerHTML = `<div class="bg-line"><span class="bg-prompt">grey@hack:~$ </span>${bgCurrentLine}<span style="animation:blink 1s infinite;">_</span></div>`;
                bgCharIdx++;
                setTimeout(typeBackground, 45 + Math.random() * 40);
            } else {
                bgIsTyping = false;
                setTimeout(() => {
                    bgContainer.innerHTML = `<div class="bg-line"><span class="bg-prompt">grey@hack:~$ </span>${bgCmds[bgIdx % bgCmds.length]}</div>`;
                    bgIdx++;
                    bgCharIdx = 0;
                    bgIsTyping = true;
                    setTimeout(typeBackground, 2000);
                }, 500);
            }
        }
    }
    setTimeout(typeBackground, 500);

    function loadUsers() {
        const stored = localStorage.getItem('greyhack_users');
        if (stored) users = JSON.parse(stored);
        else {
            users = [
                { username: "grey", password: "grey123", email: "god@greyh4ck.com", bio: "👑 THE GOD OF H4CKERS", followers: 301500, following: [], workspace: { files: { "demo.html": { content: "<h1>Hello GreyH4ck!</h1>", type: "html" }, "script.js": { content: "console.log('Welcome!');", type: "js" } }, panelFiles: [null, null, null, null] } },
                { username: "nexus", password: "nexus99", email: "nexus@test.com", bio: "Security Expert 🔒", followers: 1234, following: [], workspace: { files: {}, panelFiles: [null, null, null, null] } }
            ];
            saveUsers();
        }
        const session = sessionStorage.getItem('greySession');
        if (session) {
            const { username } = JSON.parse(session);
            if (blockedUsers.includes(username)) { sessionStorage.removeItem('greySession'); window.location.href = 'login.html'; return; }
            currentUser = users.find(u => u.username === username);
            if (currentUser && !currentUser.workspace) currentUser.workspace = { files: {}, panelFiles: [null, null, null, null] };
            if (currentUser && !currentUser.workspace.files) currentUser.workspace.files = {};
            if (currentUser && !currentUser.following) currentUser.following = [];
            if (currentUser && currentUser.followers === undefined) currentUser.followers = 0;
        }
    }
    function updateUser(updated) {
        const idx = users.findIndex(u => u.username === updated.username);
        if (idx !== -1) users[idx] = updated;
        saveUsers();
        if (currentUser?.username === updated.username) currentUser = updated;
    }

    loadUsers();
    if (!currentUser) { sessionStorage.removeItem('greySession'); window.location.href = 'login.html'; }
    const isAdmin = (currentUser.username === ADMIN);
    if (isAdmin) document.getElementById('adminMenu').style.display = 'flex';
    if (currentUser.workspace.panelFiles) panelFiles = currentUser.workspace.panelFiles;
    if (globalPosts.length === 0) {
        globalPosts = [
            { id: 1, username: "grey", type: "text", content: "Welcome to GreyH4ck! 👑", time: new Date().toLocaleString(), likes: [], comments: [] },
            { id: 2, username: "grey", type: "gif", content: "Hacker vibe", time: new Date().toLocaleString(), likes: [], media: "https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExa3M2eGZqdnNocGp6aGxoN2NodWphZzZpcjc0cTQ5OXVxZmI0M3M0YyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7abB06u9bNzA8LC8/giphy.gif", comments: [] }
        ];
        savePosts();
    }

    // Auto refresh for live updates
    let refreshInterval = null;
    function startAutoRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(() => {
            const storedPosts = JSON.parse(localStorage.getItem('grey_posts') || '[]');
            const storedNotif = JSON.parse(localStorage.getItem('notifications') || '[]');
            if (JSON.stringify(storedPosts) !== JSON.stringify(globalPosts)) {
                globalPosts = storedPosts;
                if (currentPage === 'threads') renderThreads();
                if (currentPage === 'ranking') renderRanking();
                if (currentPage === 'profile') renderProfile();
            }
            if (JSON.stringify(storedNotif) !== JSON.stringify(notifications)) {
                notifications = storedNotif;
                updateNotifBadge();
            }
        }, 1000);
    }
    startAutoRefresh();

    function renderFileList() {
        const container = document.getElementById('fileList');
        if (!container) return;
        const files = currentUser.workspace.files;
        container.innerHTML = Object.keys(files).map(name => `<div class="file-item" data-file="${name}"><i class="fas fa-file-code"></i><span>${name}</span><span class="file-del" data-file="${name}"><i class="fas fa-trash"></i></span></div>`).join('');
        document.querySelectorAll('.file-item').forEach(el => {
            el.addEventListener('click', (e) => { if (!e.target.classList.contains('file-del')) openFileInPanel(el.dataset.file); });
            const del = el.querySelector('.file-del');
            if (del) del.addEventListener('click', (e) => { e.stopPropagation(); const fn = del.dataset.file; if (confirm(`Delete ${fn}?`)) { delete currentUser.workspace.files[fn]; updateUser(currentUser); renderFileList(); renderEditorGrid(); showToast(`Deleted ${fn}`); } });
        });
    }
    function openFileInPanel(filename) { const empty = panelFiles.findIndex(f => f === null); if (empty === -1) { showToast("All panels full!"); return; } panelFiles[empty] = filename; savePanel(); renderEditorGrid(); }
    function savePanel() { currentUser.workspace.panelFiles = [...panelFiles]; updateUser(currentUser); }
    function updateFileContent(filename, content) { if (currentUser.workspace.files[filename]) { currentUser.workspace.files[filename].content = content; updateUser(currentUser); } }
    function createNewFile() { let name = prompt("File name:", "newfile.html"); if (!name) return; if (currentUser.workspace.files[name]) { alert("Exists!"); return; } currentUser.workspace.files[name] = { content: "# New file", type: "txt" }; updateUser(currentUser); renderFileList(); openFileInPanel(name); }

    function renderEditorGrid() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `<div class="card"><div class="card-header"><i class="fas fa-code"></i> TERMUX EDITOR</div><div class="card-content"><div class="editor-grid">${[0,1,2,3].map(idx => `<div class="editor-panel"><div class="editor-header"><span class="title">${panelFiles[idx] || 'empty'}</span><button class="close-panel" data-panel="${idx}"><i class="fas fa-times"></i></button></div>${panelFiles[idx] ? `<textarea id="panel_${idx}" class="editor-textarea" data-file="${panelFiles[idx]}">${escapeHtml(currentUser.workspace.files[panelFiles[idx]]?.content || '')}</textarea>` : `<div class="empty-panel" onclick="window.promptSelectFile()">+ Select File</div>`}</div>`).join('')}</div></div></div><div class="status-bar">TERMUX • 4 panels</div>`;
        for (let i = 0; i < 4; i++) { if (panelFiles[i]) { const ta = document.getElementById(`panel_${i}`); if (ta) ta.addEventListener('blur', function () { updateFileContent(this.dataset.file, this.value); }); } }
        document.querySelectorAll('.close-panel').forEach(btn => btn.addEventListener('click', (e) => { const i = parseInt(btn.dataset.panel); panelFiles[i] = null; savePanel(); renderEditorGrid(); }));
    }
    window.promptSelectFile = function () { const files = Object.keys(currentUser.workspace.files); if (files.length === 0) { showToast("No files"); return; } const selected = prompt(`Files:\n${files.join('\n')}\n\nEnter filename:`); if (selected && currentUser.workspace.files[selected]) openFileInPanel(selected); };

    function renderLiveView() {
        const preview = (() => { for (let f of panelFiles) if (f) return currentUser.workspace.files[f]?.content; return null; })();
        const main = document.getElementById('mainContent');
        main.innerHTML = `<div class="card"><div class="card-header"><i class="fas fa-eye"></i> LIVE VIEW — ${liveFormat.toUpperCase()} <div style="display:inline-flex;gap:0.5rem;margin-left:1rem;">${['html', 'python', 'text'].map(f => `<button class="type-btn ${liveFormat === f ? 'active' : ''}" data-format="${f}">${f.toUpperCase()}</button>`).join('')}</div></div><div class="card-content">${liveFormat === 'html' ? `<iframe srcdoc="${escapeHtml(preview || '')}" style="width:100%;height:100%;background:white;border-radius:8px;"></iframe>` : `<pre style="color:#c0c8dc;">${escapeHtml(preview || 'No file')}</pre>`}</div></div>`;
        document.querySelectorAll('[data-format]').forEach(btn => btn.addEventListener('click', () => { liveFormat = btn.dataset.format; renderLiveView(); }));
    }

    function postThread() {
        const content = document.getElementById('newPostContent')?.value.trim();
        if (!content) { showToast("Cannot post empty!"); return; }
        globalPosts.unshift({ id: Date.now(), username: currentUser.username, type: postType, content: content, time: new Date().toLocaleString(), likes: [], comments: [], media: postType !== 'text' ? document.getElementById('mediaUrlInput')?.value : null });
        savePosts();
        document.getElementById('newPostContent').value = '';
        if (document.getElementById('mediaUrlInput')) document.getElementById('mediaUrlInput').value = '';
        renderThreads();
        showToast("Posted!");
    }
    function likePost(id) { const post = globalPosts.find(p => p.id === id); if (post) { if (post.likes.includes(currentUser.username)) post.likes = post.likes.filter(u => u !== currentUser.username); else { post.likes.push(currentUser.username); if (post.username !== currentUser.username) addNotif(`${currentUser.username} liked your post`, 'like'); } savePosts(); renderThreads(); } }
    function commentPost(id) { const comment = prompt("Write comment:"); if (!comment) return; const post = globalPosts.find(p => p.id === id); if (post) { post.comments.push({ user: currentUser.username, text: comment, time: new Date().toLocaleTimeString() }); savePosts(); if (post.username !== currentUser.username) addNotif(`${currentUser.username} commented: "${comment.substring(0,30)}"`, 'comment'); renderThreads(); } }
    function renderThreads() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `<div class="card"><div class="card-header"><i class="fas fa-feather-alt"></i> THREADS</div><div class="card-content"><div class="new-post"><div class="post-type">${['text', 'image', 'gif'].map(t => `<button class="type-btn ${postType === t ? 'active' : ''}" data-type="${t}">${t.toUpperCase()}</button>`).join('')}</div><textarea id="newPostContent" class="post-input" rows="2" placeholder="Share something..."></textarea><div id="mediaContainer" style="display:${postType !== 'text' ? 'block' : 'none'}"><input id="mediaUrlInput" class="media-input" placeholder="Enter URL..."></div><button class="btn-post" onclick="window.postThread()">POST</button></div>${globalPosts.map(p => `<div class="post"><div class="post-header" onclick="window.openProfile('${p.username}')"><div class="post-avatar"><i class="fas fa-user-secret"></i></div><div><div class="post-username">${p.username} ${p.username === ADMIN ? '👑' : ''}</div><div class="post-time">${p.time}</div></div></div><div class="post-content">${escapeHtml(p.content)}</div>${p.type !== 'text' && p.media ? `<div class="post-media"><img src="${p.media}" onerror="this.style.display='none'"></div>` : ''}<div class="post-actions"><span class="post-like ${p.likes.includes(currentUser.username) ? 'liked' : ''}" onclick="window.likePost(${p.id})"><i class="fas fa-heart"></i> ${p.likes.length}</span><span class="post-comment" onclick="window.commentPost(${p.id})"><i class="fas fa-comment"></i> ${p.comments?.length || 0}</span></div>${p.comments?.length ? `<div style="margin-top:0.5rem;font-size:0.7rem;border-top:1px solid rgba(60,66,90,0.3);padding-top:0.5rem;">${p.comments.slice(-2).map(c => `<div><span style="color:#5de4c7;">${c.user}:</span> ${escapeHtml(c.text)}</div>`).join('')}</div>` : ''}</div>`).join('')}</div></div>`;
        document.querySelectorAll('[data-type]').forEach(btn => btn.addEventListener('click', () => { postType = btn.dataset.type; document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.getElementById('mediaContainer').style.display = postType !== 'text' ? 'block' : 'none'; }));
        notifications.forEach(n => n.read = true); saveNotif(); updateNotifBadge();
    }

    function renderRanking() {
        const scores = users.map(u => {
            const userPosts = globalPosts.filter(p => p.username === u.username);
            const likes = userPosts.reduce((s, p) => s + p.likes.length, 0);
            return { ...u, score: (userPosts.length * 10) + likes + (u.followers || 0), posts: userPosts.length, likes };
        }).sort((a, b) => b.score - a.score);
        const main = document.getElementById('mainContent');
        main.innerHTML = `<div class="card"><div class="card-header"><i class="fas fa-trophy"></i> LEADERBOARD</div><div class="card-content">${scores.map((u, i) => `<div class="rank-item"><div class="rank-num">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`}</div><div><div class="rank-name" onclick="window.openProfile('${u.username}')">${u.username} ${u.username === ADMIN ? '<span class="spin">👑</span> GOD' : ''}</div><div class="rank-stats">${u.posts} posts • ${u.likes} likes • ${u.followers || 0} followers</div></div><div class="rank-score">${u.score} pts</div></div>`).join('')}</div></div>`;
    }

    function openProfile(username) { viewingProfile = username; profileTab = 'posts'; renderProfile(); }
    function renderProfile() {
        const user = users.find(u => u.username === viewingProfile);
        if (!user) { showToast("User not found"); return; }
        const userPosts = globalPosts.filter(p => p.username === user.username);
        const userMedia = userPosts.filter(p => p.type === 'image' || p.type === 'gif');
        const isFollowing = (currentUser.following || []).includes(user.username);
        const isOwn = (currentUser.username === viewingProfile);
        const isGod = (user.username === ADMIN);
        const folDisplay = isGod ? "301.5K" : (user.followers || 0).toLocaleString();
        const main = document.getElementById('mainContent');
        main.innerHTML = `<div class="card"><div class="profile-cover"></div><div class="profile-info"><div class="profile-avatar-large"><i class="fas fa-user-secret"></i></div><h2 style="color:#5de4c7;">${user.username} ${isGod ? '<span class="spin">👑</span> GOD' : ''}</h2><div class="profile-stats"><div class="profile-stat"><div class="profile-stat-num">${userPosts.length}</div><div class="profile-stat-label">POSTS</div></div><div class="profile-stat"><div class="profile-stat-num">${folDisplay}</div><div class="profile-stat-label">FOLLOWERS</div></div><div class="profile-stat"><div class="profile-stat-num">${user.following?.length || 0}</div><div class="profile-stat-label">FOLLOWING</div></div></div><div class="profile-bio">${user.bio || 'No bio yet'}</div><div class="profile-bio" style="font-size:0.7rem;">📧 ${user.email || 'no email'}</div><div class="profile-buttons">${!isOwn ? `<button class="${isFollowing ? 'btn-unfollow' : 'btn-follow'}" onclick="window.toggleFollow('${user.username}')">${isFollowing ? 'UNFOLLOW' : 'FOLLOW'}</button><button class="btn-chat" onclick="window.openChat('${user.username}')">💬 CHAT</button>` : ''}<button class="btn-back" onclick="window.goBack()">← BACK</button></div></div><div class="profile-tabs"><div class="profile-tab ${profileTab === 'posts' ? 'active' : ''}" data-tab="posts">📝 POSTS</div><div class="profile-tab ${profileTab === 'media' ? 'active' : ''}" data-tab="media">🖼️ MEDIA</div><div class="profile-tab ${profileTab === 'files' ? 'active' : ''}" data-tab="files">📁 FILES</div></div><div class="profile-grid" id="profileGrid">${profileTab === 'posts' ? userPosts.map(p => `<div class="profile-grid-item" onclick="showToast('${escapeHtml(p.content)}')"><i class="fas fa-file-alt"></i></div>`).join('') : profileTab === 'media' ? userMedia.map(p => `<div class="profile-grid-item"><img src="${p.media}" style="width:100%;height:100%;object-fit:cover;" onerror="this.src='https://via.placeholder.com/100'"></div>`).join('') : Object.keys(user.workspace?.files || {}).map(f => `<div class="profile-grid-item" style="aspect-ratio:auto;padding:0.5rem;"><i class="fas fa-file-code"></i> ${f}</div>`).join('')}</div></div>`;
        document.querySelectorAll('.profile-tab').forEach(tab => tab.addEventListener('click', () => { profileTab = tab.dataset.tab; renderProfile(); }));
    }
    window.toggleFollow = function (username) {
        const target = users.find(u => u.username === username);
        if (!target) return;
        let following = currentUser.following || [];
        if (following.includes(username)) {
            following = following.filter(u => u !== username);
            target.followers = Math.max(0, (target.followers || 1) - 1);
            showToast(`Unfollowed ${username}`);
        } else {
            following.push(username);
            target.followers = (target.followers || 0) + 1;
            showToast(`Followed ${username}`);
            addNotif(`${currentUser.username} started following you!`, 'follow');
        }
        currentUser.following = following;
        updateUser(currentUser);
        updateUser(target);
        renderProfile();
    };
    window.goBack = () => setPage('dashboard');

    function openChat(username) {
        currentChatUser = username;
        currentChatId = [currentUser.username, username].sort().join('_');
        if (!privateChats[currentChatId]) privateChats[currentChatId] = [];
        renderChat();
        if (chatInterval) clearInterval(chatInterval);
        chatInterval = setInterval(() => {
            if (currentChatId && document.getElementById('chatMessages')) {
                const stored = JSON.parse(localStorage.getItem('private_chats') || '{}');
                if (JSON.stringify(stored[currentChatId]) !== JSON.stringify(privateChats[currentChatId])) {
                    privateChats[currentChatId] = stored[currentChatId] || [];
                    renderChatMessages();
                }
            }
        }, 500);
    }
    function renderChatMessages() {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        container.innerHTML = (privateChats[currentChatId] || []).map((m, idx) => `<div class="chat-bubble ${m.user === currentUser.username ? 'chat-mine' : 'chat-other'}" style="align-self:${m.user === currentUser.username ? 'flex-end' : 'flex-start'};"><div style="font-size:0.6rem;">${m.user === currentUser.username ? 'You' : m.user}</div>${m.type === 'image' ? `<img src="${m.msg}" style="max-width:150px;border-radius:8px;margin-top:0.3rem;">` : m.msg}<div style="font-size:0.5rem;opacity:0.6;">${m.time}</div>${(isAdmin || m.user === currentUser.username) ? `<button class="chat-delete" onclick="window.deleteChatMsg(${idx})"><i class="fas fa-trash"></i></button>` : ''}</div>`).join('');
        container.scrollTop = container.scrollHeight;
    }
    function renderChat() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `<div class="card"><div class="card-header"><button class="btn-back" onclick="window.closeChat()" style="background:none;border:none;color:#5de4c7;cursor:pointer;">← BACK</button> <span>💬 Chat with ${currentChatUser} ${currentChatUser === ADMIN ? '👑' : ''}</span></div><div class="chat-messages" id="chatMessages" style="display:flex;flex-direction:column;"></div><div class="chat-input-area"><input id="chatInput" class="chat-input" placeholder="Type message..." onkeypress="if(event.key==='Enter') sendMsg()"><button class="btn-post" onclick="sendImage()"><i class="fas fa-image"></i></button><button class="btn-post" onclick="sendMsg()">SEND</button></div></div>`;
        renderChatMessages();
        window.sendMsg = function () { const input = document.getElementById('chatInput'); if (!input.value.trim()) return; privateChats[currentChatId].push({ user: currentUser.username, msg: input.value.trim(), time: new Date().toLocaleTimeString(), type: 'text' }); savePrivate(); input.value = ''; renderChatMessages(); };
        window.sendImage = function () { const url = prompt("Enter image URL:"); if (url && url.startsWith('http')) { privateChats[currentChatId].push({ user: currentUser.username, msg: url, time: new Date().toLocaleTimeString(), type: 'image' }); savePrivate(); renderChatMessages(); } else showToast("Invalid URL"); };
    }
    window.deleteChatMsg = function (idx) { if (privateChats[currentChatId] && privateChats[currentChatId][idx] && (isAdmin || privateChats[currentChatId][idx].user === currentUser.username)) { privateChats[currentChatId].splice(idx, 1); savePrivate(); renderChatMessages(); showToast("Deleted"); } else showToast("Can't delete this message"); };
    window.closeChat = function () { if (chatInterval) clearInterval(chatInterval); chatInterval = null; setPage('dashboard'); };

    function renderCommunity() {
        const group = communityGroups[currentGroup];
        if (!group) { currentGroup = Object.keys(communityGroups)[0]; renderCommunity(); return; }
        const main = document.getElementById('mainContent');
        main.innerHTML = `<div class="card"><div class="card-header"><i class="fas fa-users"></i> COMMUNITY</div><div class="card-content"><div class="community-layout"><div class="group-list"><div style="color:#5de4c7;margin-bottom:0.5rem;">GROUPS</div>${Object.keys(communityGroups).map(g => `<div class="group-item ${currentGroup === g ? 'active' : ''}" data-group="${g}">${communityGroups[g].name}<div style="font-size:0.6rem;">${communityGroups[g].members.length} members</div></div>`).join('')}<div class="group-create" id="createGroupBtn">+ NEW GROUP</div></div><div class="chat-area"><div class="chat-messages" id="communityMessages" style="height:300px;overflow-y:auto;">${(group.chats || []).map((c, idx) => `<div class="chat-msg" style="margin-bottom:0.6rem;"><span class="message-user" onclick="window.openProfile('${c.user}')" style="color:#5de4c7;cursor:pointer;">${c.user} ${c.user === ADMIN ? '👑' : ''}</span> <span style="font-size:0.6rem;color:#8a95aa;">${c.time}</span><div style="color:#c0c8dc;">${escapeHtml(c.msg)}</div>${(isAdmin || c.user === currentUser.username) ? `<button class="delete-msg" onclick="window.deleteCommunityMsg('${currentGroup}', ${idx})"><i class="fas fa-trash"></i></button>` : ''}</div>`).join('')}</div><div class="chat-input-area"><input id="communityInput" class="chat-input" placeholder="Type message..." onkeypress="if(event.key==='Enter') sendCommunityMsg()"><button class="btn-post" onclick="sendCommunityMsg()">SEND</button></div></div><div class="member-list"><div style="color:#5de4c7;margin-bottom:0.5rem;">MEMBERS</div>${group.members.map(m => `<div class="member-item" onclick="window.openProfile('${m}')">👤 ${m} ${m === ADMIN ? '👑' : ''}</div>`).join('')}</div></div></div></div>`;
        document.querySelectorAll('.group-item').forEach(el => el.addEventListener('click', () => { currentGroup = el.dataset.group; renderCommunity(); }));
        document.getElementById('createGroupBtn')?.addEventListener('click', () => { let name = prompt("Group name:"); if (name) { let id = name.toLowerCase().replace(/[^a-z0-9]/g, '_') + Date.now(); communityGroups[id] = { name, members: [currentUser.username], chats: [] }; saveCommunity(); currentGroup = id; renderCommunity(); } });
        if (communityInterval) clearInterval(communityInterval);
        communityInterval = setInterval(() => {
            if (currentPage === 'community') {
                const stored = JSON.parse(localStorage.getItem('grey_community') || '{}');
                if (JSON.stringify(stored[currentGroup]?.chats) !== JSON.stringify(communityGroups[currentGroup]?.chats)) {
                    communityGroups = stored;
                    renderCommunity();
                }
            }
        }, 500);
        window.sendCommunityMsg = function () { const inp = document.getElementById('communityInput'); if (inp && inp.value.trim()) { communityGroups[currentGroup].chats.push({ user: currentUser.username, msg: inp.value.trim(), time: new Date().toLocaleTimeString() }); saveCommunity(); inp.value = ''; renderCommunity(); } };
    }
    window.deleteCommunityMsg = function (groupId, idx) { if (isAdmin || communityGroups[groupId].chats[idx]?.user === currentUser.username) { communityGroups[groupId].chats.splice(idx, 1); saveCommunity(); renderCommunity(); showToast("Deleted"); } else showToast("Only admin or owner can delete"); };

    function renderAdmin() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `<div class="card"><div class="card-header"><i class="fas fa-crown"></i> ADMIN PANEL 👑</div><div class="card-content"><h3 style="color:#5de4c7;">Users</h3>${users.map(u => `<div style="background:rgba(25,29,45,0.7);padding:0.8rem;margin-bottom:0.8rem;border-radius:10px;display:flex;justify-content:space-between;flex-wrap:wrap;"><div><span style="color:${u.username === ADMIN ? '#ff6666' : '#e0e6f5'}">${u.username} ${u.username === ADMIN ? '👑' : ''}</span><br><small style="color:#a0a8bc;">📧 ${u.email}</small><br><small style="color:#a0a8bc;">Followers: ${u.username === ADMIN ? '301.5K' : u.followers}</small></div><div><button class="type-btn" onclick="window.openProfile('${u.username}')">View</button> ${u.username !== ADMIN ? `<button class="type-btn" style="background:#ff6666;" onclick="window.blockUser('${u.username}')">Block</button>` : ''}</div></div>`).join('')}<h3 style="color:#5de4c7;margin-top:1rem;">Blocked Users</h3>${blockedUsers.length === 0 ? '<p style="color:#a0a8bc;">None</p>' : blockedUsers.map(b => `<div style="display:flex;justify-content:space-between;background:rgba(25,29,45,0.7);padding:0.6rem;margin-bottom:0.5rem;border-radius:10px;"><span style="color:#c0c8dc;">${b}</span><button class="type-btn" onclick="window.unblockUser('${b}')">Unblock</button></div>`).join('')}</div></div>`;
    }
    window.blockUser = (u) => { if (!blockedUsers.includes(u)) { blockedUsers.push(u); saveBlocked(); renderAdmin(); showToast(`Blocked ${u}`); } };
    window.unblockUser = (u) => { blockedUsers = blockedUsers.filter(b => b !== u); saveBlocked(); renderAdmin(); showToast(`Unblocked ${u}`); };

    function renderDashboard() {
        const hour = new Date().getHours();
        const greeting = hour < 12 ? "Good morning" : hour < 18 ? "Good afternoon" : "Good evening";
        const filesCount = Object.keys(currentUser.workspace.files).length;
        const postsCount = globalPosts.length;
        const likesCount = globalPosts.reduce((s, p) => s + p.likes.length, 0);
        const unread = notifications.filter(n => !n.read).length;
        document.getElementById('mainContent').innerHTML = `<div class="card"><div class="card-header"><i class="fas fa-tachometer-alt"></i> DASHBOARD</div><div class="card-content" style="text-align:center;padding:2rem;"><div style="font-size:1.8rem;color:#5de4c7;">⚡ GreyH4ck Terminal</div><div style="margin:0.8rem 0;font-size:1rem;color:#c0c8dc;">${greeting}, ${currentUser.username}${isAdmin ? ' 👑' : ''}</div><div style="width:60px;height:2px;background:#5de4c7;margin:1rem auto;"></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:2rem;"><div style="background:rgba(30,35,55,0.6);padding:1rem;border-radius:14px;"><i class="fas fa-file-alt"></i><div style="margin-top:0.3rem;font-size:0.8rem;">FILES</div><div style="font-size:1.5rem;">${filesCount}</div></div><div style="background:rgba(30,35,55,0.6);padding:1rem;border-radius:14px;"><i class="fas fa-feather-alt"></i><div style="margin-top:0.3rem;font-size:0.8rem;">POSTS</div><div style="font-size:1.5rem;">${postsCount}</div></div><div style="background:rgba(30,35,55,0.6);padding:1rem;border-radius:14px;"><i class="fas fa-heart"></i><div style="margin-top:0.3rem;font-size:0.8rem;">LIKES</div><div style="font-size:1.5rem;">${likesCount}</div></div><div style="background:rgba(30,35,55,0.6);padding:1rem;border-radius:14px;"><i class="fas fa-bell"></i><div style="margin-top:0.3rem;font-size:0.8rem;">NOTIFS</div><div style="font-size:1.5rem;">${unread}</div></div></div></div></div>`;
    }

    function setPage(page) {
        currentPage = page;
        if (page === 'dashboard') renderDashboard();
        else if (page === 'threads') renderThreads();
        else if (page === 'ranking') renderRanking();
        else if (page === 'editor') renderEditorGrid();
        else if (page === 'liveview') renderLiveView();
        else if (page === 'community') renderCommunity();
        else if (page === 'admin') renderAdmin();
        document.querySelectorAll('.menu-item').forEach(m => { if (m.dataset.page === page) m.classList.add('active'); else m.classList.remove('active'); });
    }

    // Search
    document.getElementById('searchInput')?.addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        const results = users.filter(u => u.username.toLowerCase().includes(q) && u.username !== currentUser.username);
        const resDiv = document.getElementById('searchResults');
        if (q && results.length > 0) {
            resDiv.style.display = 'block';
            resDiv.innerHTML = results.map(u => `<div class="search-result" onclick="window.openProfile('${u.username}'); document.getElementById('searchInput').value=''; resDiv.style.display='none';">👤 ${u.username}</div>`).join('');
        } else resDiv.style.display = 'none';
    });

    function updateSidebar() {
        document.getElementById('sideUsername').innerHTML = `${currentUser.username} ${isAdmin ? '<span class="god-badge"><span class="spin">👑</span> GOD</span>' : ''}`;
        if (currentUser.workspace.avatar) document.getElementById('sideAvatar').innerHTML = `<img src="${currentUser.workspace.avatar}" style="width:100%;height:100%;object-fit:cover;">`;
        document.getElementById('drawerUsername').value = currentUser.username;
        document.getElementById('drawerEmail').value = currentUser.email || '';
        document.getElementById('drawerBio').value = currentUser.bio || '';
    }

    // Event listeners
    document.querySelectorAll('.menu-item').forEach(m => m.addEventListener('click', () => setPage(m.dataset.page)));
    document.getElementById('newFileBtn').onclick = () => createNewFile();
    const drawer = document.getElementById('drawer');
    document.getElementById('settingsBtn').onclick = () => drawer.classList.add('open');
    document.getElementById('editIcon').onclick = () => drawer.classList.add('open');
    document.getElementById('closeDrawer').onclick = () => drawer.classList.remove('open');
    document.getElementById('saveProfileBtn').onclick = () => {
        const newName = document.getElementById('drawerUsername').value.trim();
        if (newName && newName !== currentUser.username) { if (users.find(u => u.username === newName)) showToast('Username taken'); else currentUser.username = newName; }
        currentUser.email = document.getElementById('drawerEmail').value;
        currentUser.bio = document.getElementById('drawerBio').value;
        updateUser(currentUser);
        sessionStorage.setItem('greySession', JSON.stringify({ username: currentUser.username }));
        updateSidebar();
        drawer.classList.remove('open');
        showToast('Profile saved');
    };
    document.getElementById('logoutBtn').onclick = () => { sessionStorage.removeItem('greySession'); window.location.href = 'login.html'; };
    document.getElementById('uploadAvatarBtn').onclick = () => document.getElementById('avatarInput').click();
    document.getElementById('avatarInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file && file.type.includes('image')) {
            const reader = new FileReader();
            reader.onload = (ev) => { currentUser.workspace.avatar = ev.target.result; updateUser(currentUser); updateSidebar(); showToast('Avatar updated'); };
            reader.readAsDataURL(file);
        }
    };

    updateSidebar();
    renderFileList();
    updateNotifBadge();
    setPage('dashboard');

    window.openProfile = openProfile;
    window.openChat = openChat;
    window.postThread = postThread;
    window.likePost = likePost;
    window.commentPost = commentPost;
</script>
</body>
</html>
